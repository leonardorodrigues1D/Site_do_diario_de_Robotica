<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diário de Robótica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🤖 Diário de Robótica</h1>
    <p>Registre seus projetos e ideias</p>
  </header>

  <main>
    <section class="form">
      <input type="text" id="titulo" placeholder="Nome do projeto">
      <textarea id="descricao" placeholder="Descrição do projeto"></textarea>
      <button onclick="adicionarProjeto()">Adicionar Projeto</button>
    </section>

    <section>
      <h2>📂 Meus Projetos</h2>
      <div id="lista-projetos"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
